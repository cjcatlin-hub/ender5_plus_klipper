[include mainsail.cfg]

######################################################################
#  Ender 5 Plus
######################################################################

#-----------------------------------------------------------
# Printer
#-----------------------------------------------------------

[mcu]
# UART
serial: /dev/ttyAMA0
baud: 250000
restart_method: command

# USB
#serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_17001C00125031334B343920-if00
# serial: /dev/ttyAMA0
# restart_method: command

[temperature_sensor SKR_Pro]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

#[mcu rpi]
#serial: /tmp/klipper_host_mcu

[temperature_sensor raspberry_pi_4B]
sensor_type: temperature_host
min_temp: 10
max_temp: 100


[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 1800
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 5

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>

#-----------------------------------------------------------
# Bed Mesh
#-----------------------------------------------------------

[bed_mesh]
speed: 180
horizontal_move_z: 10
mesh_min: 47, 30
mesh_max: 300, 300
probe_count: 5,5
mesh_pps: 2, 2
bicubic_tension: 0.2
algorithm: bicubic
move_check_distance: 5
split_delta_z: .025

#-----------------------------------------------------------
# Bed Screws
#-----------------------------------------------------------
[screws_tilt_adjust]
screw1: 291, 308
screw1_name: front left screw
screw2: 11, 308
screw2_name: front right screw
screw3: 11, 48
screw3_name: rear right screw
screw4: 291, 48
screw4_name: rear left screw
horizontal_move_z: 10
speed: 300
screw_thread: CW-M3

#-----------------------------------------------------------
# Probe
#-----------------------------------------------------------

[crtouch]
sensor_pin: ^PC14 #Remove ^ if print head crashes into bed, the ^ is for the CR touch a bl touch should work without.
control_pin: PA1
x_offset: 45
y_offset: 5
#z_offset: 3.0
speed: 5
samples: 2
sample_retract_dist: 5

[safe_z_home]
home_xy_position: 180,180 # Change coordinates to the center of your print bed
speed: 50
z_hop: 10                 # Move up 10mm
z_hop_speed: 5

#-----------------------------------------------------------
# X/Y/Z Stepper Motors
#-----------------------------------------------------------

[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 350
homing_speed: 100

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 350
homing_speed: 100

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 4
# endstop_pin: ^PC2
# position_endstop: 0.0
endstop_pin: probe:z_virtual_endstop
position_max: 400
position_min: -1

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
hold_current: 0.500
stealthchop_threshold: 999999

#-----------------------------------------------------------
# Extruder
#-----------------------------------------------------------

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
rotation_distance: 32.75
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
min_temp: 0
max_temp: 260

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650
hold_current: 0.500
stealthchop_threshold: 999999

#-----------------------------------------------------------
# Heated Bed
#-----------------------------------------------------------

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_Kp: 70
#pid_Ki: 1.5
#pid_Kd: 800
min_temp: 0
max_temp: 130

#-----------------------------------------------------------
# Fans
#-----------------------------------------------------------

[heater_fan controller_fan]
pin: PC7
heater: heater_bed
heater_temp: 45.0

[heater_fan nozzle_cooling_fan]
pin: PB15

[fan]
pin: PC6


######################################################################
#  BigTreeTech TFT TouchScreen emulated 12864 mode
######################################################################

[display]
lcd_type: emulated_st7920
spi_software_miso_pin: PD8 # status led, Virtual MISO
spi_software_mosi_pin: PD6
spi_software_sclk_pin: PB9
en_pin: PB8
encoder_pins: ^PA10, ^PA9
click_pin: ^!PA15

[output_pin beeper]
pin: PB5

######################################################################
#  Macros
######################################################################


[gcode_macro PURGE_LINE]
gcode:
    # Test Line
    M117 Printing Purge Line
    G92 E0 ;Reset Extruder
    G1 Z2.0 F3000 ;Move Z Axis up
    G1 X10.1 Y20 Z0.28 F5000.0 ;Move to start position
    G1 X10.1 Y200.0 Z0.28 F1500.0 E15 ;Draw the first line
    G1 X10.4 Y200.0 Z0.28 F5000.0 ;Move to side a little
    G1 X10.4 Y20 Z0.28 F1500.0 E30 ;Draw the second line
    G92 E0 ;Reset Extruder
    G1 Z2.0 F3000 ;Move Z Axis up
    M117 Here we go!

